name: build-binaries

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: nvidia-hub-linux
          - os: windows-latest
            asset: nvidia-hub-windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller nvidia-hub.spec --clean --noconfirm

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/nvidia-hub.exe "out/${{ matrix.asset }}"
          else
            cp dist/nvidia-hub "out/${{ matrix.asset }}"
            chmod +x "out/${{ matrix.asset }}"
          fi

      - name: Upload to release v1.0.0
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload v1.0.0 "${{ matrix.asset }}" --dir out --clobber --repo Ax1zz/nvidia-hub
